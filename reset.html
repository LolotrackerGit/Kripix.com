<!DOCTYPE html>
<html lang="it">
<head>
 <!-- ========================================== -->
    <!-- SEO & OPEN GRAPH (CONDIVISIONE SOCIAL)     -->
    <!-- ========================================== -->
    
    <!-- Descrizione base per i motori di ricerca (Max 160 caratteri) -->
    <meta name="description" content="Kripix Entertainment: A different way to see pixels">
    
    <!-- Parole chiave (Keywords) -->
    <meta name="keywords" content="videogiochi, sviluppo indie, kripix, il filo del dubbio, pixel otros, engine narrativo, thriller psicologico">
    
    <!-- Autore -->
    <meta name="author" content="Kripix Entertainment">
    
    <!-- Istruzioni per i Crawler (Permette a Google di indicizzare la pagina) -->
    <meta name="robots" content="index, follow">

    <!-- TAG OPEN GRAPH (Per Facebook, Discord, LinkedIn, ecc.) -->
    <!-- Titolo che appare nell'anteprima -->
    <meta property="og:title" content="Kripix Entertainment | A different way to see pixels">
    
    <!-- Descrizione dell'anteprima -->
    <meta property="og:description" content="Esplora i nostri mondi immersivi. Scopri 'Il Filo del Dubbio' e accedi al network operativo per gli agenti Kripix.">
    
    <!-- Immagine di copertina (DEVI METTERE UN URL ASSOLUTO VALIDO) -->
    <!-- Esempio: "https://kripix-studio.netlify.app/assets/cover-social.jpg" -->
    <meta property="og:image" content="https://kripix.netlify.app/SocialPreview.pngE"> 
    
    <!-- URL della pagina principale -->
    <meta property="og:url" content="https://kripix.netlify.app/">
    
    <!-- Tipo di contenuto -->
    <meta property="og:type" content="website">

    <!-- TAG TWITTER / X (Specifici per la visualizzazione Card su X) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Kripix Entertainment">
    <meta name="twitter:description" content="Creatori di esperienze narrative ad alta tensione. Unisciti al network.">
    <meta name="twitter:image" content="https://kripix.netlify.app/SocialPreview.png">
    
    <!-- Tema colore Browser Mobile (La barra in alto su Chrome per Android diventerà scura) -->
    <meta name="theme-color" content="#05070a">   
    <meta charset="UTF-8">

    <!-- ========================================== -->
    <!-- FAVICON (ICONA SULLA TAB DEL BROWSER)      -->
    <!-- ========================================== -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="/favicon.ico"> <!-- Fallback per browser vecchi -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripristino Protocollo - Kripix</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Courier+Prime&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-grid"></div>
    
    <nav>
        <div class="logo-text"><a href="index.html">KRIPIX</a></div>
        <a href="login.html" class="back-link">← TORNA AL LOGIN</a>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>RIPRISTINO CHIAVE</h2>
                <!-- Qui scriveremo l'email dell'utente una volta verificato il link -->
                <p id="status-text" style="font-family:'Courier Prime'; font-size:0.8rem; color:#888;">Verifica del canale crittografato in corso...</p>
            </div>

            <!-- Il form all'inizio è nascosto. Lo mostriamo solo se il link della mail è valido -->
            <form id="resetForm" class="terminal-form" style="display: none;">
                
                <div class="input-group">
                    <label>NUOVA PASSWORD (Min 8 car. + 1 Numero)</label>
                    <input type="password" id="new-pass-input" placeholder="Inserisci nuova password" required>
                </div>
                
                <div class="input-group">
                    <label>CONFERMA NUOVA PASSWORD</label>
                    <input type="password" id="confirm-pass-input" placeholder="Ripeti password" required>
                </div>
                
                <p id="final-reset-msg" class="validation-msg" style="text-align:center; display:none;"></p>
                
                <button type="submit" id="btn-submit" class="btn-gold full-width">AGGIORNA CREDENZIALI</button>
            </form>

        </div>
    </div>

    <!-- SCRIPT FIREBASE -->
    <script type="module">
        import { auth } from './script.js';
        import { verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        document.addEventListener('DOMContentLoaded', async () => {
            const statusText = document.getElementById('status-text');
            const resetForm = document.getElementById('resetForm');
            
            // 1. Firebase mette un codice segreto nell'URL quando clicchi la mail. Lo peschiamo:
            const params = new URLSearchParams(window.location.search);
            const actionCode = params.get('oobCode');

            // Se uno apre la pagina senza aver cliccato il link della mail:
            if (!actionCode) {
                statusText.innerText = ">> ERRORE: Nessun token di ripristino rilevato. Usa il link inviato via email.";
                statusText.style.color = "#ff5555";
                return;
            }

            // 2. Verifichiamo subito se il link è valido (o se è scaduto/già usato)
            try {
                // verifyPasswordResetCode restituisce l'email dell'utente se il codice è valido
                const userEmail = await verifyPasswordResetCode(auth, actionCode);
                
                // Link valido! Mostriamo l'email e sblocchiamo il form
                statusText.innerHTML = `Identità verificata: <span style="color:var(--accent-gold);">${userEmail}</span>`;
                resetForm.style.display = 'block';
                
            } catch (error) {
                statusText.innerText = ">> ERRORE: Link crittografato scaduto o già utilizzato.";
                statusText.style.color = "#ff5555";
                return;
            }

            // 3. Gestiamo il click sul bottone per cambiare la password
            resetForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const newPass = document.getElementById('new-pass-input').value;
                const confirmPass = document.getElementById('confirm-pass-input').value;
                const btn = document.getElementById('btn-submit');
                const msgEl = document.getElementById('final-reset-msg');
                msgEl.style.display = 'none';

                // Controlli base
                if (newPass.length < 8 || !/\d/.test(newPass)) {
                    showError(msgEl, "Password troppo debole (min 8 caratteri + 1 numero).");
                    return;
                }
                if (newPass !== confirmPass) {
                    showError(msgEl, "Le password non coincidono.");
                    return;
                }

                btn.innerText = "SOVRASCRITTURA IN CORSO...";
                btn.style.opacity = "0.7";
                btn.style.pointerEvents = "none";

                try {
                    // 4. Inviamo la nuova password a Firebase
                    await confirmPasswordReset(auth, actionCode, newPass);
                    
                    // Fatto!
                    btn.innerText = "PROTOCOLLO COMPLETATO";
                    btn.style.background = '#4caf50';
                    btn.style.borderColor = '#4caf50';
                    btn.style.color = '#000';
                    btn.style.opacity = "1";
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);

                } catch (error) {
                    btn.innerText = "AGGIORNA CREDENZIALI";
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "auto";
                    showError(msgEl, "Errore di connessione col server. Riprova.");
                    console.error(error);
                }
            });
        });

        function showError(element, text) {
            element.innerText = '>> ' + text;
            element.style.display = 'block';
        }
    </script>
</body>
</html>
