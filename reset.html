<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Kripix</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Courier+Prime&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-grid"></div>
    <nav>
        <div class="logo-text"><a href="index.html">KRIPIX</a></div>
        <a href="login.html" class="back-link">← TORNA AL LOGIN</a>
    </nav>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>REIMPOSTA PASSWORD</h2>
                <p style="font-family:'Courier Prime'; font-size:0.8rem; color:#888;">Inserisci il codice ricevuto via email.</p>
            </div>
            <form id="resetForm" class="terminal-form">
                <input type="hidden" id="user-email-field">
                <div class="input-group">
                    <label>CODICE DI SICUREZZA (6 CIFRE)</label>
                    <input type="text" id="reset-code-input" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>NUOVA PASSWORD (Min 8 car. + 1 Numero)</label>
                    <input type="password" id="new-pass-input" required>
                </div>
                <div class="input-group">
                    <label>CONFERMA NUOVA PASSWORD</label>
                    <input type="password" id="confirm-pass-input" required>
                </div>
                <p id="final-reset-msg" class="validation-msg" style="text-align:center;"></p>
                <button type="submit" class="btn-gold full-width">CONFERMA E ACCEDI</button>
            </form>
        </div>
    </div>

    <script>
        import { auth } from './script.js';
import { verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

document.addEventListener('DOMContentLoaded', async () => {
    // 1. Prendi il codice segreto (oobCode) dall'URL che Firebase ti ha inviato via mail
    const params = new URLSearchParams(window.location.search);
    const actionCode = params.get('oobCode');
    const mode = params.get('mode'); // Dovrebbe essere "resetPassword"
    
    if (!actionCode) {
        document.querySelector('.login-box').innerHTML = '<h3 style="color:#ff5555; text-align:center;">ERRORE: Link di ripristino non valido o mancante.</h3>';
        return;
    }

    // 2. Opzionale: Verifica subito se il codice è valido prima che l'utente scriva la password
    try {
        const email = await verifyPasswordResetCode(auth, actionCode);
        document.getElementById('user-email-field').value = email; // Mostra l'email (se vuoi)
    } catch (error) {
        document.querySelector('.login-box').innerHTML = '<h3 style="color:#ff5555; text-align:center;">ERRORE: Il link è scaduto o è già stato utilizzato.</h3>';
        return;
    }

    // 3. Gestisci l'invio del form
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const newPass = document.getElementById('new-pass-input').value;
        const confirmPass = document.getElementById('confirm-pass-input').value;
        const btn = this.querySelector('button');
        const msgEl = document.getElementById('final-reset-msg');
        msgEl.style.display = 'none';

        if (newPass.length < 8 || !/\d/.test(newPass)) {
            showResetError("Password troppo debole (min 8 caratteri + 1 numero).");
            return;
        }
        if (newPass !== confirmPass) {
            showResetError("Le password non coincidono.");
            return;
        }

        btn.innerText = "CRITTOGRAFIA IN CORSO...";
        btn.disabled = true;

        try {
            // 4. Cambia la password su Firebase!
            await confirmPasswordReset(auth, actionCode, newPass);
            
            btn.innerText = "PASSWORD AGGIORNATA!";
            btn.style.background = '#4caf50';
            btn.style.color = '#000';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);

        } catch (error) {
            btn.innerText = "CONFERMA E ACCEDI";
            btn.disabled = false;
            showResetError("Errore durante l'aggiornamento. Riprova.");
            console.error(error);
        }
    });
});

function showResetError(text) {
    const msgEl = document.getElementById('final-reset-msg');
    msgEl.innerText = '>> ' + text;
    msgEl.style.display = 'block';
}
    </script>
</body>
</html>
