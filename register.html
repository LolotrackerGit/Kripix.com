<!DOCTYPE html>
<html lang="it">
<head>
 <!-- ========================================== -->
    <!-- SEO & OPEN GRAPH (CONDIVISIONE SOCIAL)     -->
    <!-- ========================================== -->
    
    <!-- Descrizione base per i motori di ricerca (Max 160 caratteri) -->
    <meta name="description" content="Kripix Entertainment: A different way to see pixels">
    
    <!-- Parole chiave (Keywords) -->
    <meta name="keywords" content="videogiochi, sviluppo indie, kripix, il filo del dubbio, pixel otros, engine narrativo, thriller psicologico">
    
    <!-- Autore -->
    <meta name="author" content="Kripix Entertainment">
    
    <!-- Istruzioni per i Crawler (Permette a Google di indicizzare la pagina) -->
    <meta name="robots" content="index, follow">

    <!-- TAG OPEN GRAPH (Per Facebook, Discord, LinkedIn, ecc.) -->
    <!-- Titolo che appare nell'anteprima -->
    <meta property="og:title" content="Kripix Entertainment | A different way to see pixels">
    
    <!-- Descrizione dell'anteprima -->
    <meta property="og:description" content="Esplora i nostri mondi immersivi. Scopri 'Il Filo del Dubbio' e accedi al network operativo per gli agenti Kripix.">
    
    <!-- Immagine di copertina (DEVI METTERE UN URL ASSOLUTO VALIDO) -->
    <!-- Esempio: "https://kripix-studio.netlify.app/assets/cover-social.jpg" -->
    <meta property="og:image" content="https://kripix.netlify.app/SocialPreview.pngE"> 
    
    <!-- URL della pagina principale -->
    <meta property="og:url" content="https://kripix.netlify.app/">
    
    <!-- Tipo di contenuto -->
    <meta property="og:type" content="website">

    <!-- TAG TWITTER / X (Specifici per la visualizzazione Card su X) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Kripix Entertainment">
    <meta name="twitter:description" content="Creatori di esperienze narrative ad alta tensione. Unisciti al network.">
    <meta name="twitter:image" content="https://kripix.netlify.app/SocialPreview.png">
    
    <!-- Tema colore Browser Mobile (La barra in alto su Chrome per Android diventerà scura) -->
    <meta name="theme-color" content="#05070a">   
    <meta charset="UTF-8">

    <!-- ========================================== -->
    <!-- FAVICON (ICONA SULLA TAB DEL BROWSER)      -->
    <!-- ========================================== -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="/favicon.ico"> <!-- Fallback per browser vecchi -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - Kripix</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Courier+Prime&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-grid"></div>

    <nav>
        <div class="logo-text"><a href="index.html">KRIPIX</a></div>
        <a href="index.html" class="back-link">← ANNULLA</a>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>NUOVO AGENTE</h2>
                <p style="font-family:'Courier Prime'; font-size:0.8rem; color:#888;">INIZIALIZZAZIONE PROTOCOLLO CLOUD</p>
            </div>

            <form class="terminal-form" id="registerForm" novalidate>
                
                <div class="input-group">
                    <label>EMAIL OPERATIVA</label>
                    <input type="email" id="email" placeholder="nome@esempio.com" required>
                    <div class="validation-msg" id="msg-email"></div>
                </div>

                <div class="input-group">
                    <label>NOME IN CODICE (USERNAME)</label>
                    <input type="text" id="regUsername" placeholder="Scegli il tuo ID" required autocomplete="off">
                    <div class="validation-msg" id="msg-user"></div>
                </div>

                <div class="input-group">
                    <label>PASSWORD (Min 8 car. + 1 Numero)</label>
                    <input type="password" id="pass1" placeholder="Crea password" required>
                    <div class="validation-msg" id="msg-pass1"></div>
                </div>

                <div class="input-group">
                    <label>CONFERMA PASSWORD</label>
                    <input type="password" id="pass2" placeholder="Ripeti password" required>
                    <div class="validation-msg" id="msg-pass2"></div>
                </div>

                <!-- Messaggio di errore/successo globale dal Server -->
                <div class="validation-msg" id="msg-server" style="text-align: center; margin-bottom: 15px; font-size: 0.85rem;"></div>

                <button type="submit" class="btn-gold full-width glow-effect">CREA ACCOUNT</button>
            </form>

            <div class="login-footer">
                <p>Hai già un ID?</p>
                <a href="login.html" class="register-link">TORNA AL LOGIN</a>
            </div>
        </div>
    </div>

    <!-- SCRIPT FIREBASE -->
    <script type="module">
        import { auth, db } from './script.js';
        import { createUserWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            // 1. Reset Grafico
            document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
            document.querySelectorAll('.validation-msg').forEach(el => el.style.display = 'none');

            const email = document.getElementById('email');
            const user = document.getElementById('regUsername');
            const pass1 = document.getElementById('pass1');
            const pass2 = document.getElementById('pass2');
            const serverMsg = document.getElementById('msg-server');
            const btnSubmit = this.querySelector('button');
            
            let isValid = true;

            // Validazione Formale Locale
            if (!user.value.trim()) { showError(user, 'msg-user', '>> ID RICHIESTO'); isValid = false; }
            
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email.value)) { showError(email, 'msg-email', '>> FORMATO EMAIL NON VALIDO'); isValid = false; }

            if (pass1.value.length < 8 || !/\d/.test(pass1.value)) { 
                showError(pass1, 'msg-pass1', '>> MINIMO 8 CARATTERI E 1 NUMERO'); isValid = false; 
            }
            if (pass1.value !== pass2.value) { showError(pass2, 'msg-pass2', '>> PASSWORD NON COINCIDENTI'); isValid = false; }

            if (!isValid) return;

            // Avvio Connessione al Server
            btnSubmit.innerHTML = 'CONNESSIONE AL SERVER...';
            btnSubmit.style.opacity = '0.7';
            btnSubmit.style.pointerEvents = 'none';

            try {
                // Controllo disponibilità Username nel database
                const usernameValue = user.value.trim();
                const userDocRef = doc(db, "users", usernameValue.toLowerCase()); 
                const docSnap = await getDoc(userDocRef);

                if (docSnap.exists()) {
                    showError(user, 'msg-user', '>> ERRORE: ID GIA IN USO NEL SISTEMA');
                    throw new Error("Username-taken");
                }

                // Creazione account Google Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email.value.trim(), pass1.value);
                const firebaseUser = userCredential.user;

                // Salvataggio Dossier nel Database Firestore
                const newUserColor = getRandomColor();
                await setDoc(userDocRef, {
                    uid: firebaseUser.uid,
                    username: usernameValue,
                    email: email.value.trim(),
                    color: newUserColor,
                    avatar_img: null,
                    games: [],
                    friends: [],
                    requests: [],
                    privacy: { visibility: true, telemetry: false, newsletter: true },
                    createdAt: new Date().toISOString()
                });

                // INVIO MAIL DI VERIFICA
                await sendEmailVerification(firebaseUser);

                // DISCONNESSIONE FORZATA (L'utente non può entrare finché non clicca la mail)
                await signOut(auth);

                // Successo UI
                btnSubmit.innerHTML = 'PROTOCOLLO INVIATO ALLA TUA MAIL';
                btnSubmit.style.background = 'var(--accent-gold)';
                btnSubmit.style.borderColor = 'var(--accent-gold)';
                btnSubmit.style.color = '#000';

                serverMsg.innerText = ">> ATTENZIONE: Controlla la tua casella di posta per confermare l'identità.";
                serverMsg.style.color = "var(--accent-gold)";
                serverMsg.style.display = 'block';

                // Riporta al login
                setTimeout(() => {
                    window.location.href = 'login.html'; 
                }, 4000);

            } catch (error) {
                btnSubmit.innerHTML = 'CREA ACCOUNT';
                btnSubmit.style.opacity = '1';
                btnSubmit.style.pointerEvents = 'auto';

                if (error.message === "Username-taken") {
                    // Errore già mostrato a video
                } else if (error.code === 'auth/email-already-in-use') {
                    showError(email, 'msg-email', '>> ERRORE: EMAIL GIÀ REGISTRATA');
                } else {
                    serverMsg.innerText = '>> ERRORE SERVER: ' + error.message;
                    serverMsg.style.display = 'block';
                }
                console.error(error);
            }
        });

        function showError(input, msgId, text) {
            input.classList.add('input-error');
            const msg = document.getElementById(msgId);
            msg.innerText = text;
            msg.style.display = 'block';
            input.style.animation = 'none';
            input.offsetHeight; 
            input.style.animation = 'shake 0.3s';
        }

        function getRandomColor() {
            const colors = ['#8b2323', '#e3c66c', '#2a475e', '#4caf50', '#9c27b0'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        document.querySelectorAll('input').forEach(i => i.addEventListener('input', function(){
            this.classList.remove('input-error');
            const msgEl = this.parentElement.querySelector('.validation-msg');
            if(msgEl) msgEl.style.display = 'none';
        }));
    </script>
</body>
</html>
